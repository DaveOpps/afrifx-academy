# Render Blueprint — deploys the whole app as ONE free web service.
# The build compiles the React client and Express serves it + the /api.
services:
  - type: web
    name: afrifx-academy
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a strong secret
      - key: DATABASE_URL
        sync: false                # paste your Neon Postgres connection string
      - key: PUBLIC_URL
        sync: false                # set to this service's URL, e.g. https://afrifx-academy.onrender.com
      # Optional — email (otherwise messages just log to the server console):
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: SMTP_FROM
      #   sync: false
